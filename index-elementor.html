<!-- Pixel Demand Propostas - versao segura para widget HTML do Elementor. Cole este arquivo inteiro no widget. -->
<style>

      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

      :root,
      .pd-proposal {
        --pd-bg: #050505;
        --pd-graphite: #111010;
        --pd-panel: #1b181a;
        --pd-panel-2: #211f20;
        --pd-line: rgba(255, 255, 255, 0.13);
        --pd-line-soft: rgba(255, 255, 255, 0.08);
        --pd-line-lime: rgba(45, 255, 18, 0.45);
        --pd-lime: #2dff12;
        --pd-text: #f8f8f4;
        --pd-muted: #bdb7b7;
        --pd-soft: #8c8686;
        --pd-radius: 18px;
        --pd-radius-lg: 30px;
        --pd-display: "Nokia Expanded", "NokiaPureHeadline", "Eurostile Extended", "Arial Black", Impact, sans-serif;
        --pd-body: "Plus Jakarta Sans", Inter, "Segoe UI", Arial, sans-serif;
        --pd-brand-font: "Nokia Expanded", "Eurostile Extended", "Arial Black", Impact, sans-serif;
        --pd-container: min(1180px, calc(100vw - 40px));
        --pd-brand-icon-url: url("imagens identidade visual pixel demand/icone pixel demand.png");
      }

      .pd-proposal,
      .pd-proposal * {
        box-sizing: border-box;
      }
.pd-proposal::before {
        position: absolute;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(90deg, color-mix(in srgb, var(--pd-lime) 7%, transparent) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.88) 42%, transparent 100%);
      }

      .pd-proposal::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        opacity: 0.16;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E");
        mix-blend-mode: soft-light;
      }

      .pd-proposal {
        position: relative;
        isolation: isolate;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        overflow-x: clip;
        color: var(--pd-text);
        background:
          radial-gradient(circle at 82% 0%, color-mix(in srgb, var(--pd-lime) 18%, transparent), transparent 23rem),
          radial-gradient(circle at 5% 12%, color-mix(in srgb, var(--pd-lime) 7%, transparent), transparent 25rem),
          linear-gradient(180deg, #020202 0%, var(--pd-bg) 44%, #090808 100%);
        font-family: var(--pd-body);
        text-rendering: geometricPrecision;
      }

      .pd-proposal * {
        box-sizing: border-box;
      }

      .pd-proposal a {
        color: inherit;
        text-decoration: none;
      }

      .pd-proposal button {
        appearance: none;
        font: inherit;
      }

      .pd-proposal img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      .pd-proposal figure {
        margin: 0;
      }

      .pd-proposal section {
        max-width: 100%;
      }

      .pd-proposal ul,
      .pd-proposal li {
        list-style: none !important;
      }

      .pd-proposal ul {
        margin-left: 0 !important;
        padding-left: 0 !important;
      }

      .pd-proposal li::marker {
        content: "" !important;
      }

      .pd-proposal h1,
      .pd-proposal h2,
      .pd-proposal h3,
      .pd-proposal p {
        margin-top: 0;
      }

      .pd-image-holder-broken {
        min-height: 0 !important;
        padding: 16px !important;
      }

      .pd-image-holder-broken::after {
        display: none !important;
      }

      .pd-topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        width: var(--pd-container);
        min-height: 76px;
        margin: 0 auto;
        padding: 14px 0;
        backdrop-filter: blur(18px);
      }

      .pd-brand {
        display: inline-flex;
        flex: 0 0 auto;
        gap: 12px;
        align-items: center;
        min-width: 0;
        font-family: var(--pd-brand-font);
        font-size: 0.76rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .pd-brand img {
        flex: 0 0 auto;
        object-fit: contain;
      }

      .pd-brand-symbol {
        width: 34px;
        height: 34px;
        object-fit: contain;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.16));
      }

      .pd-brand-wordmark {
        width: clamp(148px, 17vw, 214px);
        height: auto;
        padding: 8px 12px;
        border: 1px solid color-mix(in srgb, var(--pd-lime) 26%, transparent);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
      }

      .pd-nav {
        display: flex;
        gap: 6px;
        align-items: center;
        max-width: 100%;
        padding: 6px;
        overflow-x: auto;
        color: var(--pd-muted);
        border: 1px solid var(--pd-line);
        border-radius: 999px;
        background: rgba(17, 17, 17, 0.74);
        scrollbar-width: none;
      }

      .pd-nav::-webkit-scrollbar {
        display: none;
      }

      .pd-nav a {
        flex: 0 0 auto;
        min-height: 34px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 800;
        white-space: nowrap;
        transition: 180ms ease;
      }

      .pd-nav a:hover {
        color: #050505;
        background: var(--pd-lime);
      }

      .pd-main {
        width: var(--pd-container);
        margin: 0 auto;
        padding: clamp(22px, 4vw, 48px) 0 76px;
      }

      .pd-hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.14fr) minmax(280px, 0.68fr);
        gap: clamp(16px, 2.6vw, 34px);
        align-items: stretch;
        min-height: min(760px, calc(100vh - 118px));
        padding-bottom: clamp(44px, 7vw, 84px);
      }

      .pd-hero-copy {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
        min-height: 560px;
        padding: clamp(28px, 5.4vw, 72px);
        overflow: hidden;
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius-lg);
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--pd-lime) 14%, transparent), transparent 38%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.016)),
          var(--pd-graphite);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      .pd-hero-copy::before {
        position: absolute;
        top: -90px;
        right: -105px;
        width: clamp(190px, 28vw, 360px);
        height: clamp(190px, 28vw, 360px);
        content: "";
        background: var(--pd-lime);
        border-radius: 46%;
        opacity: 0.92;
      }

      .pd-hero-copy::after {
        position: absolute;
        right: max(-80px, -7vw);
        bottom: -50px;
        width: min(42vw, 450px);
        aspect-ratio: 1;
        content: "";
        background: var(--pd-brand-icon-url) center / contain no-repeat;
        opacity: 0.48;
        filter: drop-shadow(0 26px 36px rgba(0, 0, 0, 0.45));
        transform: rotate(-9deg);
      }

      .pd-hero-copy > * {
        position: relative;
        z-index: 1;
      }

      .pd-eyebrow,
      .pd-kicker {
        color: var(--pd-lime);
        font-size: clamp(0.7rem, 1.1vw, 0.82rem);
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .pd-hero h1 {
        max-width: 11ch;
        margin: 22px 0 0;
        font-family: var(--pd-display);
        font-size: clamp(3rem, 7.2vw, 6.45rem);
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.055em;
        text-transform: uppercase;
      }

      .pd-hero h1 span {
        display: block;
        color: var(--pd-lime);
      }

      .pd-lead {
        max-width: 620px;
        margin: 28px 0 0;
        color: #ece7e7;
        font-size: clamp(1rem, 1.45vw, 1.22rem);
        line-height: 1.72;
      }

      .pd-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      .pd-button {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 14px 19px;
        border: 1px solid var(--pd-line);
        border-radius: 999px;
        color: var(--pd-text);
        background: rgba(255, 255, 255, 0.06);
        font-size: 0.88rem;
        font-weight: 900;
        white-space: nowrap;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
      }

      .pd-button:hover {
        transform: translateY(-2px);
        border-color: var(--pd-line-lime);
      }

      .pd-button.primary {
        color: #030303;
        border-color: transparent;
        background: var(--pd-lime);
        box-shadow: 0 0 28px color-mix(in srgb, var(--pd-lime) 24%, transparent);
      }

      .pd-button.small {
        min-height: 40px;
        padding: 10px 14px;
        font-size: 0.78rem;
      }

      .pd-hero-side {
        display: grid;
        gap: 14px;
        align-content: end;
        min-width: 0;
      }

      .pd-brand-showcase {
        position: relative;
        min-height: 260px;
        padding: clamp(18px, 2.6vw, 28px);
        overflow: hidden;
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius);
        background:
          linear-gradient(150deg, var(--pd-lime) 0 46%, rgba(255, 255, 255, 0.96) 46% 100%);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
      }

      .pd-brand-showcase img {
        position: relative;
        z-index: 1;
        display: block;
        object-fit: contain;
      }

      .pd-brand-showcase .pd-showcase-logo {
        width: min(92%, 360px);
        margin-left: auto;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.2);
      }

      .pd-brand-showcase .pd-showcase-star {
        position: absolute;
        left: -54px;
        bottom: -62px;
        width: clamp(190px, 24vw, 300px);
        opacity: 0.9;
        filter: drop-shadow(0 22px 26px rgba(0, 0, 0, 0.28));
        transform: rotate(-10deg);
      }

      .pd-metric,
      .pd-side-note,
      .pd-panel,
      .pd-card,
      .pd-timeline-item,
      .pd-condition,
      .pd-gallery-card,
      .pd-scope-box {
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.062), rgba(255, 255, 255, 0.022)),
          var(--pd-panel);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
      }

      .pd-metric,
      .pd-side-note {
        padding: clamp(22px, 3vw, 32px);
      }

      .pd-metric strong {
        display: block;
        color: var(--pd-lime);
        font-family: var(--pd-display);
        font-size: clamp(3rem, 6vw, 5.2rem);
        line-height: 0.9;
        letter-spacing: -0.05em;
        text-transform: uppercase;
      }

      .pd-metric span,
      .pd-side-note p {
        display: block;
        margin: 14px 0 0;
        color: var(--pd-muted);
        line-height: 1.58;
      }

      .pd-side-note h2 {
        margin: 0;
        font-size: clamp(1.2rem, 2vw, 1.42rem);
        line-height: 1.2;
        letter-spacing: -0.035em;
      }

      .pd-section {
        display: grid;
        grid-template-columns: minmax(250px, 0.48fr) minmax(0, 1fr);
        gap: clamp(22px, 4vw, 56px);
        align-items: start;
        padding: clamp(56px, 9vw, 110px) 0;
      }

      .pd-section > * {
        min-width: 0;
      }

      .pd-section-heading {
        position: sticky;
        top: 104px;
        align-self: start;
        min-width: 0;
      }

      .pd-section-heading h2 {
        max-width: 100%;
        margin: 12px 0 0;
        font-family: var(--pd-display);
        font-size: clamp(2.35rem, 5.2vw, 5.4rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
        text-transform: uppercase;
        overflow-wrap: break-word;
      }

      .pd-section-heading p {
        max-width: 36rem;
        margin: 18px 0 0;
        color: var(--pd-muted);
        line-height: 1.7;
      }

      .pd-panel {
        min-width: 0;
        padding: clamp(22px, 4vw, 38px);
      }

      .pd-identity-panel {
        display: grid;
        grid-template-columns: minmax(0, 0.88fr) minmax(260px, 1fr);
        gap: 18px;
        align-items: stretch;
      }

      .pd-identity-copy {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .pd-identity-copy .pd-intro-text {
        margin-bottom: 24px;
      }

      .pd-identity-logo {
        width: min(100%, 380px);
        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
      }

      .pd-identity-art {
        position: relative;
        min-height: 340px;
        overflow: hidden;
        border: 1px solid var(--pd-line-lime);
        border-radius: var(--pd-radius);
        background: #111;
      }

      .pd-identity-art img {
        width: 100%;
        height: 100%;
        min-height: 340px;
        object-fit: cover;
      }

      .pd-identity-art::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.74)),
          linear-gradient(90deg, color-mix(in srgb, var(--pd-lime) 24%, transparent), transparent 58%);
      }

      .pd-intro-text {
        margin: 0;
        color: #ebe8e8;
        font-size: clamp(1.25rem, 2.25vw, 2rem);
        font-weight: 800;
        line-height: 1.44;
        letter-spacing: -0.04em;
      }

      .pd-list {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .pd-list li {
        position: relative;
        padding: 17px 18px 17px 42px;
        color: #e7e2e2;
        border: 1px solid var(--pd-line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.035);
        line-height: 1.6;
      }

      .pd-list li::before {
        position: absolute;
        top: 24px;
        left: 18px;
        width: 8px;
        height: 8px;
        content: "";
        background: var(--pd-lime);
        box-shadow: 0 0 16px color-mix(in srgb, var(--pd-lime) 55%, transparent);
      }

      .pd-grid-3 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 235px), 1fr));
        gap: 14px;
        min-width: 0;
      }

      .pd-card,
      .pd-condition {
        position: relative;
        min-width: 0;
        min-height: 245px;
        padding: clamp(21px, 2.2vw, 28px);
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .pd-card:hover,
      .pd-condition:hover,
      .pd-card.is-active {
        transform: translateY(-4px);
        border-color: var(--pd-line-lime);
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--pd-lime) 9%, transparent), rgba(255, 255, 255, 0.02)),
          var(--pd-panel);
      }

      .pd-card::after {
        position: absolute;
        right: -42px;
        bottom: -42px;
        width: 116px;
        height: 116px;
        content: "";
        border: 1px solid color-mix(in srgb, var(--pd-lime) 34%, transparent);
        border-radius: 50%;
      }

      .pd-index {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        color: #020202;
        background: var(--pd-lime);
        border-radius: 50%;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .pd-card h3,
      .pd-condition h3 {
        margin: 25px 0 12px;
        font-family: var(--pd-body);
        font-size: clamp(1.08rem, 1.6vw, 1.28rem);
        font-weight: 800;
        line-height: 1.18;
        letter-spacing: -0.025em;
      }

      .pd-card p,
      .pd-condition p {
        margin: 0;
        color: var(--pd-muted);
        line-height: 1.62;
      }

      .pd-price {
        display: block;
        margin-top: 26px;
        color: var(--pd-lime);
        font-family: var(--pd-display);
        font-size: clamp(2rem, 3.8vw, 3.1rem);
        font-weight: 900;
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .pd-featured {
        border-color: var(--pd-line-lime);
        background:
          linear-gradient(160deg, color-mix(in srgb, var(--pd-lime) 18%, transparent), transparent 48%),
          var(--pd-panel-2);
      }

      .pd-tag {
        display: inline-flex;
        margin-bottom: 10px;
        padding: 7px 10px;
        color: #030303;
        background: var(--pd-lime);
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .pd-card-actions {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 20px;
      }

      .pd-accordion {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .pd-accordion-item {
        overflow: hidden;
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius);
        background: rgba(255, 255, 255, 0.035);
      }

      .pd-accordion-trigger {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        min-height: 72px;
        padding: 0 20px;
        color: var(--pd-text);
        border: 0;
        background: transparent;
        cursor: pointer;
        text-align: left;
      }

      .pd-accordion-trigger strong {
        padding-right: 16px;
        font-size: 1rem;
        line-height: 1.32;
      }

      .pd-accordion-trigger span {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        width: 34px;
        height: 34px;
        color: #050505;
        background: var(--pd-lime);
        border-radius: 50%;
        font-size: 1.2rem;
        font-weight: 900;
        transition: transform 180ms ease;
      }

      .pd-accordion-item.open .pd-accordion-trigger span {
        transform: rotate(45deg);
      }

      .pd-accordion-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height 260ms ease;
      }

      .pd-accordion-content {
        padding: 0 20px 22px;
        color: var(--pd-muted);
        line-height: 1.7;
      }

      .pd-accordion-content .pd-list {
        margin-top: 16px;
      }

      .pd-timeline {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .pd-timeline-item {
        display: grid;
        grid-template-columns: minmax(90px, 0.2fr) minmax(0, 1fr);
        gap: 20px;
        align-items: start;
        padding: clamp(20px, 2.4vw, 26px);
      }

      .pd-timeline-item time {
        color: var(--pd-lime);
        font-weight: 900;
        line-height: 1.25;
      }

      .pd-timeline-item h3 {
        margin: 0 0 8px;
        font-size: 1.08rem;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .pd-timeline-item p {
        margin: 0;
        color: var(--pd-muted);
        line-height: 1.62;
      }

      .pd-scope-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .pd-scope-box {
        padding: clamp(22px, 3vw, 32px);
      }

      .pd-scope-box h3 {
        margin: 0 0 18px;
        font-size: clamp(1.1rem, 1.8vw, 1.45rem);
        line-height: 1.15;
        letter-spacing: -0.035em;
      }

      .pd-investment {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.56fr);
        gap: 24px;
        align-items: end;
        margin: clamp(30px, 5vw, 50px) 0;
        padding: clamp(28px, 5vw, 54px);
        overflow: hidden;
        border-radius: var(--pd-radius-lg);
        color: #050505;
        background: var(--pd-lime);
      }

      .pd-investment::after {
        position: absolute;
        top: -90px;
        right: -110px;
        width: 360px;
        height: 360px;
        content: "";
        background: var(--pd-brand-icon-url) center / contain no-repeat;
        opacity: 0.48;
        mix-blend-mode: luminosity;
      }

      .pd-investment h2 {
        position: relative;
        z-index: 1;
        max-width: 11ch;
        margin: 0;
        font-family: var(--pd-display);
        font-size: clamp(2.7rem, 6.4vw, 6.2rem);
        line-height: 0.9;
        letter-spacing: -0.065em;
        text-transform: uppercase;
      }

      .pd-investment-summary {
        position: relative;
        z-index: 1;
        min-width: 0;
        padding: clamp(22px, 3vw, 30px);
        color: var(--pd-text);
        border-radius: var(--pd-radius);
        background: rgba(5, 5, 5, 0.9);
      }

      .pd-investment-summary strong {
        display: block;
        color: var(--pd-lime);

      function setupAccordion() {
        const accordionItems = $$(".pd-accordion-item");

        accordionItems.forEach((item) => {
          const button = item.querySelector(".pd-accordion-trigger");
          if (!button) return;

          button.addEventListener("click", () => {
            const isOpening = !item.classList.contains("open");

            if (PROPOSTA.behavior.closeOtherAccordions) {
              accordionItems.forEach((otherItem) => {
                if (otherItem !== item) {
                  otherItem.classList.remove("open");
                  syncAccordion(otherItem);
                }
              });
            }

            item.classList.toggle("open", isOpening);
            syncAccordion(item);
          });

          syncAccordion(item);
        });

        window.addEventListener("resize", () => {
          accordionItems.forEach(syncAccordion);
        });
      }

      function setupReveal() {
        const revealItems = $$(".pd-reveal");
        if (!PROPOSTA.behavior.enableScrollReveal || !("IntersectionObserver" in window)) {
          revealItems.forEach((item) => item.classList.add("is-visible"));
          return;
        }

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.12 }
        );

        revealItems.forEach((item) => observer.observe(item));
      }

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function isPlainObject(value) {
        return value && typeof value === "object" && !Array.isArray(value);
      }

      function mergeDeep(target, source) {
        if (!isPlainObject(source)) return target;

        Object.keys(source).forEach((key) => {
          const sourceValue = source[key];
          const targetValue = target[key];

          if (Array.isArray(sourceValue)) {
            target[key] = sourceValue;
          } else if (isPlainObject(sourceValue) && isPlainObject(targetValue)) {
            target[key] = mergeDeep({ ...targetValue }, sourceValue);
          } else {
            target[key] = sourceValue;
          }
        });

        return target;
      }

      function getPath(source, path) {
        return path.split(".").reduce((current, key) => current?.[key], source);
      }

      function setPath(source, path, value) {
        const keys = path.split(".");
        let target = source;

        keys.slice(0, -1).forEach((key) => {
          if (!target[key] || typeof target[key] !== "object") target[key] = {};
          target = target[key];
        });

        target[keys[keys.length - 1]] = value;
      }

        if (PD_ADMIN_EXPORT_LOCK) return;

        window.addEventListener("keydown", (event) => {
          if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === "e") {
            event.preventDefault();
            setAdminMode(!pdAdminMode);
          }
        });

        $("#pd-admin-open")?.addEventListener("click", openAdminDrawer);
        $("#pd-admin-close")?.addEventListener("click", closeAdminDrawer);
        $("#pd-admin-close-footer")?.addEventListener("click", closeAdminDrawer);
        $("#pd-admin-backdrop")?.addEventListener("click", closeAdminDrawer);
        $("#pd-admin-exit")?.addEventListener("click", () => setAdminMode(false));
        $("#pd-admin-apply")?.addEventListener("click", () => {
          applyAdminFormToProposal();
          renderAdminEditor();
          showAdminToast("PrÃ©via atualizada.");
        });
        $("#pd-admin-save")?.addEventListener("click", saveDraft);
        $("#pd-admin-save-drawer")?.addEventListener("click", saveDraft);
        $("#pd-admin-reset")?.addEventListener("click", restoreDefaultProposal);
        $("#pd-admin-export-html")?.addEventListener("click", exportFinalHTML);
        $("#pd-admin-export-pdf")?.addEventListener("click", exportPDF);
      }

      function initProposal() {
        applyTheme();
        renderNav();
        renderApp();
        setupAccordion();
        setupPackages();
        setupReveal();
      }

      loadSavedDraft();
      initProposal();
      setupAdmin();
    </script>
