<!-- Pixel Demand Propostas - Elementor-safe v2. Cole este arquivo inteiro no widget HTML do Elementor. -->
<style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

      .pd-proposal,
      .pd-admin-bar,
      .pd-admin-drawer,
      .pd-admin-backdrop,
      .pd-admin-toast,
      .pd-quick-edit-modal {
        --pd-bg: #050505;
        --pd-graphite: #111010;
        --pd-panel: #1b181a;
        --pd-panel-2: #211f20;
        --pd-line: rgba(255, 255, 255, 0.13);
        --pd-line-soft: rgba(255, 255, 255, 0.08);
        --pd-line-lime: rgba(45, 255, 18, 0.45);
        --pd-lime: #2dff12;
        --pd-text: #f8f8f4;
        --pd-muted: #bdb7b7;
        --pd-soft: #8c8686;
        --pd-radius: 18px;
        --pd-radius-lg: 30px;
        --pd-display: "Nokia Expanded", "NokiaPureHeadline", "Eurostile Extended", "Arial Black", Impact, sans-serif;
        --pd-body: "Plus Jakarta Sans", Inter, "Segoe UI", Arial, sans-serif;
        --pd-brand-font: "Nokia Expanded", "Eurostile Extended", "Arial Black", Impact, sans-serif;
        --pd-container: min(1180px, calc(100vw - 40px));
        --pd-brand-icon-url: url("imagens identidade visual pixel demand/icone pixel demand.png");
      }

      .pd-proposal,
      .pd-proposal * {
        box-sizing: border-box;
      }


      .pd-proposal::before {
        position: absolute;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(90deg, color-mix(in srgb, var(--pd-lime) 7%, transparent) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.88) 42%, transparent 100%);
      }

      .pd-proposal::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        opacity: 0.16;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E");
        mix-blend-mode: soft-light;
      }

      .pd-proposal {
        position: relative;
        isolation: isolate;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        overflow-x: clip;
        color: var(--pd-text);
        background:
          radial-gradient(circle at 82% 0%, color-mix(in srgb, var(--pd-lime) 18%, transparent), transparent 23rem),
          radial-gradient(circle at 5% 12%, color-mix(in srgb, var(--pd-lime) 7%, transparent), transparent 25rem),
          linear-gradient(180deg, #020202 0%, var(--pd-bg) 44%, #090808 100%);
        font-family: var(--pd-body);
        text-rendering: geometricPrecision;
      }

      .pd-proposal * {
        box-sizing: border-box;
      }

      .pd-proposal a {
        color: inherit;
        text-decoration: none;
      }

      .pd-proposal button {
        appearance: none;
        font: inherit;
      }

      .pd-proposal img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      .pd-proposal figure {
        margin: 0;
      }

      .pd-proposal section {
        max-width: 100%;
      }

      .pd-proposal ul,
      .pd-proposal li {
        list-style: none !important;
      }

      .pd-proposal ul {
        margin-left: 0 !important;
        padding-left: 0 !important;
      }

      .pd-proposal li::marker {
        content: "" !important;
      }

      .pd-proposal h1,
      .pd-proposal h2,
      .pd-proposal h3,
      .pd-proposal p {
        margin-top: 0;
      }

      .pd-image-holder-broken {
        min-height: 118px !important;
        display: grid;
        place-items: center;
        padding: 18px !important;
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--pd-lime) 8%, transparent), transparent),
          rgba(255, 255, 255, 0.035) !important;
      }

      .pd-image-holder-broken::after {
        display: none !important;
      }

      .pd-image-fallback {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        max-width: 100%;
        min-height: 38px;
        padding: 9px 13px;
        color: var(--pd-muted);
        border: 1px solid var(--pd-line);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.32);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-align: center;
      }

      .pd-topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        width: var(--pd-container);
        min-height: 76px;
        margin: 0 auto;
        padding: 14px 0;
        backdrop-filter: blur(18px);
      }

      .pd-brand {
        display: inline-flex;
        flex: 0 0 auto;
        gap: 12px;
        align-items: center;
        min-width: 0;
        font-family: var(--pd-brand-font);
        font-size: 0.76rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .pd-brand img {
        flex: 0 0 auto;
        object-fit: contain;
      }

      .pd-brand-symbol {
        width: 34px;
        height: 34px;
        object-fit: contain;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.16));
      }

      .pd-brand-wordmark {
        width: clamp(148px, 17vw, 214px);
        height: auto;
        padding: 8px 12px;
        border: 1px solid color-mix(in srgb, var(--pd-lime) 26%, transparent);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
      }

      .pd-nav {
        display: flex;
        gap: 6px;
        align-items: center;
        max-width: 100%;
        padding: 6px;
        overflow-x: auto;
        color: var(--pd-muted);
        border: 1px solid var(--pd-line);
        border-radius: 999px;
        background: rgba(17, 17, 17, 0.74);
        scrollbar-width: none;
      }

      .pd-nav::-webkit-scrollbar {
        display: none;
      }

      .pd-nav a {
        flex: 0 0 auto;
        min-height: 34px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 800;
        white-space: nowrap;
        transition: 180ms ease;
      }

      .pd-nav a:hover {
        color: #050505;
        background: var(--pd-lime);
      }

      .pd-main {
        width: var(--pd-container);
        margin: 0 auto;
        padding: clamp(22px, 4vw, 48px) 0 76px;
      }

      .pd-hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.14fr) minmax(280px, 0.68fr);
        gap: clamp(16px, 2.6vw, 34px);
        align-items: stretch;
        min-height: min(760px, calc(100vh - 118px));
        padding-bottom: clamp(44px, 7vw, 84px);
      }

      .pd-hero-copy {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
        min-height: 560px;
        padding: clamp(28px, 5.4vw, 72px);
        overflow: hidden;
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius-lg);
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--pd-lime) 14%, transparent), transparent 38%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.016)),
          var(--pd-graphite);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      .pd-hero-copy::before {
        position: absolute;
        top: -90px;
        right: -105px;
        width: clamp(190px, 28vw, 360px);
        height: clamp(190px, 28vw, 360px);
        content: "";
        background: var(--pd-lime);
        border-radius: 46%;
        opacity: 0.92;
      }

      .pd-hero-copy::after {
        position: absolute;
        right: max(-80px, -7vw);
        bottom: -50px;
        width: min(42vw, 450px);
        aspect-ratio: 1;
        content: "";
        background: var(--pd-brand-icon-url) center / contain no-repeat;
        opacity: 0.48;
        filter: drop-shadow(0 26px 36px rgba(0, 0, 0, 0.45));
        transform: rotate(-9deg);
      }

      .pd-hero-copy > * {
        position: relative;
        z-index: 1;
      }

      .pd-eyebrow,
      .pd-kicker {
        color: var(--pd-lime);
        font-size: clamp(0.7rem, 1.1vw, 0.82rem);
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .pd-hero h1 {
        max-width: 11ch;
        margin: 22px 0 0;
        font-family: var(--pd-display);
        font-size: clamp(3rem, 7.2vw, 6.45rem);
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.055em;
        text-transform: uppercase;
      }

      .pd-hero h1 span {
        display: block;
        color: var(--pd-lime);
      }

      .pd-lead {
        max-width: 620px;
        margin: 28px 0 0;
        color: #ece7e7;
        font-size: clamp(1rem, 1.45vw, 1.22rem);
        line-height: 1.72;
      }

      .pd-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      .pd-button {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 14px 19px;
        border: 1px solid var(--pd-line);
        border-radius: 999px;
        color: var(--pd-text);
        background: rgba(255, 255, 255, 0.06);
        font-size: 0.88rem;
        font-weight: 900;
        white-space: nowrap;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
      }

      .pd-button:hover {
        transform: translateY(-2px);
        border-color: var(--pd-line-lime);
      }

      .pd-button.primary {
        color: #030303;
        border-color: transparent;
        background: var(--pd-lime);
        box-shadow: 0 0 28px color-mix(in srgb, var(--pd-lime) 24%, transparent);
      }

      .pd-button.small {
        min-height: 40px;
        padding: 10px 14px;
        font-size: 0.78rem;
      }

      .pd-hero-side {
        display: grid;
        gap: 14px;
        align-content: end;
        min-width: 0;
      }

      .pd-brand-showcase {
        position: relative;
        min-height: 260px;
        padding: clamp(18px, 2.6vw, 28px);
        overflow: hidden;
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius);
        background:
          linear-gradient(150deg, var(--pd-lime) 0 46%, rgba(255, 255, 255, 0.96) 46% 100%);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
      }

      .pd-brand-showcase img {
        position: relative;
        z-index: 1;
        display: block;
        object-fit: contain;
      }

      .pd-brand-showcase .pd-showcase-logo {
        width: min(92%, 360px);
        margin-left: auto;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.2);
      }

      .pd-brand-showcase .pd-showcase-star {
        position: absolute;
        left: -54px;
        bottom: -62px;
        width: clamp(190px, 24vw, 300px);
        opacity: 0.9;
        filter: drop-shadow(0 22px 26px rgba(0, 0, 0, 0.28));
        transform: rotate(-10deg);
      }

      .pd-metric,
      .pd-side-note,
      .pd-panel,
      .pd-card,
      .pd-timeline-item,
      .pd-condition,
      .pd-gallery-card,
      .pd-scope-box {
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.062), rgba(255, 255, 255, 0.022)),
          var(--pd-panel);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
      }

      .pd-metric,
      .pd-side-note {
        padding: clamp(22px, 3vw, 32px);
      }

      .pd-metric strong {
        display: block;
        color: var(--pd-lime);
        font-family: var(--pd-display);
        font-size: clamp(3rem, 6vw, 5.2rem);
        line-height: 0.9;
        letter-spacing: -0.05em;
        text-transform: uppercase;
      }

      .pd-metric span,
      .pd-side-note p {
        display: block;
        margin: 14px 0 0;
        color: var(--pd-muted);
        line-height: 1.58;
      }

      .pd-side-note h2 {
        margin: 0;
        font-size: clamp(1.2rem, 2vw, 1.42rem);
        line-height: 1.2;
        letter-spacing: -0.035em;
      }

      .pd-section {
        display: grid;
        grid-template-columns: minmax(250px, 0.48fr) minmax(0, 1fr);
        gap: clamp(22px, 4vw, 56px);
        align-items: start;
        padding: clamp(56px, 9vw, 110px) 0;
      }

      .pd-section > * {
        min-width: 0;
      }

      .pd-section-heading {
        position: sticky;
        top: 104px;
        align-self: start;
        min-width: 0;
      }

      .pd-section-heading h2 {
        max-width: 100%;
        margin: 12px 0 0;
        font-family: var(--pd-display);
        font-size: clamp(2.35rem, 5.2vw, 5.4rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
        text-transform: uppercase;
        overflow-wrap: break-word;
      }

      .pd-section-heading p {
        max-width: 36rem;
        margin: 18px 0 0;
        color: var(--pd-muted);
        line-height: 1.7;
      }

      .pd-panel {
        min-width: 0;
        padding: clamp(22px, 4vw, 38px);
      }

      .pd-identity-panel {
        display: grid;
        grid-template-columns: minmax(0, 0.88fr) minmax(260px, 1fr);
        gap: 18px;
        align-items: stretch;
      }

      .pd-identity-copy {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .pd-identity-copy .pd-intro-text {
        margin-bottom: 24px;
      }

      .pd-identity-logo {
        width: min(100%, 380px);
        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
      }

      .pd-identity-art {
        position: relative;
        min-height: 340px;
        overflow: hidden;
        border: 1px solid var(--pd-line-lime);
        border-radius: var(--pd-radius);
        background: #111;
      }

      .pd-identity-art img {
        width: 100%;
        height: 100%;
        min-height: 340px;
        object-fit: cover;
      }

      .pd-identity-art::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.74)),
          linear-gradient(90deg, color-mix(in srgb, var(--pd-lime) 24%, transparent), transparent 58%);
      }

      .pd-intro-text {
        margin: 0;
        color: #ebe8e8;
        font-size: clamp(1.25rem, 2.25vw, 2rem);
        font-weight: 800;
        line-height: 1.44;
        letter-spacing: -0.04em;
      }

      .pd-list {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .pd-list li {
        position: relative;
        padding: 17px 18px 17px 42px;
        color: #e7e2e2;
        border: 1px solid var(--pd-line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.035);
        line-height: 1.6;
      }

      .pd-list li::before {
        position: absolute;
        top: 24px;
        left: 18px;
        width: 8px;
        height: 8px;
        content: "";
        background: var(--pd-lime);
        box-shadow: 0 0 16px color-mix(in srgb, var(--pd-lime) 55%, transparent);
      }

      .pd-grid-3 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 235px), 1fr));
        gap: 14px;
        min-width: 0;
      }

      .pd-card,
      .pd-condition {
        position: relative;
        min-width: 0;
        min-height: 245px;
        padding: clamp(21px, 2.2vw, 28px);
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .pd-card > *,
      .pd-condition > * {
        position: relative;
        z-index: 1;
      }

      .pd-card:hover,
      .pd-condition:hover,
      .pd-card.is-active {
        transform: translateY(-4px);
        border-color: var(--pd-line-lime);
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--pd-lime) 9%, transparent), rgba(255, 255, 255, 0.02)),
          var(--pd-panel);
      }

      .pd-card::after {
        position: absolute;
        right: -42px;
        bottom: -42px;
        width: 116px;
        height: 116px;
        content: "";
        border: 1px solid color-mix(in srgb, var(--pd-lime) 34%, transparent);
        border-radius: 50%;
      }

      .pd-index {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        color: #020202;
        background: var(--pd-lime);
        border-radius: 50%;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .pd-card h3,
      .pd-condition h3 {
        margin: 25px 0 12px;
        font-family: var(--pd-body);
        font-size: clamp(1.08rem, 1.6vw, 1.28rem);
        font-weight: 800;
        line-height: 1.18;
        letter-spacing: -0.025em;
      }

      .pd-card p,
      .pd-condition p {
        margin: 0;
        color: var(--pd-muted);
        line-height: 1.62;
      }

      .pd-price {
        display: block;
        margin-top: 26px;
        color: var(--pd-lime);
        font-family: var(--pd-display);
        font-size: clamp(2rem, 3.8vw, 3.1rem);
        font-weight: 900;
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .pd-featured {
        border-color: var(--pd-line-lime);
        background:
          linear-gradient(160deg, color-mix(in srgb, var(--pd-lime) 18%, transparent), transparent 48%),
          var(--pd-panel-2);
      }

      .pd-tag {
        display: inline-flex;
        margin-bottom: 10px;
        padding: 7px 10px;
        color: #030303;
        background: var(--pd-lime);
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .pd-card-actions {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 20px;
      }

      .pd-accordion {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .pd-accordion-item {
        overflow: hidden;
        border: 1px solid var(--pd-line);
        border-radius: var(--pd-radius);
        background: rgba(255, 255, 255, 0.035);
      }

      .pd-accordion-trigger {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        min-height: 72px;
        padding: 0 20px;
        color: var(--pd-text);
        border: 0;
        background: transparent;
        cursor: pointer;
        text-align: left;
      }

      .pd-accordion-trigger strong {
        padding-right: 16px;
        font-size: 1rem;
        line-height: 1.32;
      }

      .pd-accordion-trigger span {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        width: 34px;
        height: 34px;
        color: #050505;
        background: var(--pd-lime);
        border-radius: 50%;
        font-size: 1.2rem;
        font-weight: 900;
        transition: transform 180ms ease;
      }

      .pd-accordion-item.open .pd-accordion-trigger span {
        transform: rotate(45deg);
      }

      .pd-accordion-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height 260ms ease;
      }

      .pd-accordion-content {
        padding: 0 20px 22px;
        color: var(--pd-muted);
        line-height: 1.7;
      }

      .pd-accordion-content .pd-list {
        margin-top: 16px;
      }

      .pd-timeline {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .pd-timeline-item {
        display: grid;
        grid-template-columns: minmax(90px, 0.2fr) minmax(0, 1fr);
        gap: 20px;
        align-items: start;
        padding: clamp(20px, 2.4vw, 26px);
      }

      .pd-timeline-item time {
        color: var(--pd-lime);
        font-weight: 900;
        line-height: 1.25;
      }

      .pd-timeline-item h3 {
        margin: 0 0 8px;
        font-size: 1.08rem;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .pd-timeline-item p {
        margin: 0;
        color: var(--pd-muted);
        line-height: 1.62;
      }

      .pd-scope-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .pd-scope-box {
        padding: clamp(22px, 3vw, 32px);
      }

      .pd-scope-box h3 {
        margin: 0 0 18px;
        font-size: clamp(1.1rem, 1.8vw, 1.45rem);
        line-height: 1.15;
        letter-spacing: -0.035em;
      }

      .pd-investment {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
        gap: 24px;
        align-items: center;
        margin: clamp(30px, 5vw, 50px) 0;
        padding: clamp(28px, 5vw, 54px);
        overflow: hidden;
        border-radius: var(--pd-radius-lg);
        color: #050505;
        background: var(--pd-lime);
      }

      .pd-investment::after {
        position: absolute;
        top: -90px;
        right: -110px;
        width: 360px;
        height: 360px;
        content: "";

      .pd-investment h2 {

      .pd-reveal {

      .pd-admin-bar,

      .pd-admin-bar {

        right: 18px;
        bottom: 18px;

      .pd-admin-button {

        flex-wrap: wrap;
        gap: 8px;

      const PD_STORAGE_KEY = "pixeldemand-proposta-admin-draft-v1";

      const PD_DEFAULT_PROPOSTA = JSON.parse(JSON.stringify(PROPOSTA));
      let pdAdminMode = false;

      const $ = (selector, context = document) => context.querySelector(selector);
      const $$ = (selector, context = document) => Array.from(context.querySelectorAll(selector));

      function escapeHTML(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function attr(value) {
        return escapeHTML(value);
      }

      const PD_STYLE_PROPS = {
        fontSize: "font-size",
        fontWeight: "font-weight",
        lineHeight: "line-height",
        letterSpacing: "letter-spacing",
        textAlign: "text-align",
        color: "color"
      };
      const PD_VISUAL_DEVICES = ["desktop", "tablet", "mobile"];

      function styleKeyFromPath(path) {
        return String(path || "")
          .replace(/\.(\d+)/g, "_$1")
          .replace(/[^a-zA-Z0-9]+([a-zA-Z0-9])/g, (_, char) => char.toUpperCase())
          .replace(/^[A-Z]/, (char) => char.toLowerCase());
      }

      function emptyVisualStyle() {
        return Object.keys(PD_STYLE_PROPS).reduce((style, key) => {
          style[key] = "";
          return style;
        }, {});
      }

      function normalizeVisualStyleEntry(entry = {}) {
        const normalized = {
          desktop: emptyVisualStyle(),
          tablet: emptyVisualStyle(),
          mobile: emptyVisualStyle()
        };

        if (!isPlainObject(entry)) return normalized;

        PD_VISUAL_DEVICES.forEach((device) => {
          if (!isPlainObject(entry[device])) return;
          Object.keys(PD_STYLE_PROPS).forEach((key) => {
            normalized[device][key] = String(entry[device][key] || "").trim();
          });
        });

        Object.keys(PD_STYLE_PROPS).forEach((key) => {
          const legacyValue = String(entry[key] || "").trim();
          if (legacyValue && !normalized.desktop[key]) {
            normalized.desktop[key] = legacyValue;
          }
        });

        return normalized;
      }

      function migrateVisualStyles() {
        PROPOSTA.visual ||= {};
        Object.keys(PROPOSTA.visual).forEach((styleKey) => {
          PROPOSTA.visual[styleKey] = normalizeVisualStyleEntry(PROPOSTA.visual[styleKey]);
        });
      }

      function safeCssValue(value) {
        return String(value || "").replace(/[{};]/g, "").trim();
      }

      function visualStyleText(styleKey, device = "desktop", source = PROPOSTA.visual) {
        const entry = normalizeVisualStyleEntry(source?.[styleKey] || {});
        const style = entry[device] || {};
        return Object.entries(PD_STYLE_PROPS)
          .map(([key, cssProp]) => {
            const value = safeCssValue(style[key]);
            return value ? `${cssProp}: ${value}` : "";
          })
          .filter(Boolean)
          .join("; ");
      }

      function cssAttributeValue(value) {
        return String(value || "").replace(/\\/g, "\\\\").replace(/"/g, '\\"');
      }

      function renderVisualStyles() {
        migrateVisualStyles();
        const visual = PROPOSTA.visual || {};
        const rules = [];

        Object.keys(visual).forEach((styleKey) => {
          const selector = `.pd-proposal [data-pd-style="${cssAttributeValue(styleKey)}"]`;
          const desktop = visualStyleText(styleKey, "desktop", visual);
          const tablet = visualStyleText(styleKey, "tablet", visual);
          const mobile = visualStyleText(styleKey, "mobile", visual);

          if (desktop) rules.push(`@media (min-width: 981px) {\n  ${selector} { ${desktop}; }\n}`);
          if (tablet) rules.push(`@media (min-width: 641px) and (max-width: 980px) {\n  ${selector} { ${tablet}; }\n}`);
          if (mobile) rules.push(`@media (max-width: 640px) {\n  ${selector} { ${mobile}; }\n}`);
        });

        let styleTag = document.getElementById("pd-dynamic-visual-styles");
        if (!styleTag) {
          styleTag = document.createElement("style");
          styleTag.id = "pd-dynamic-visual-styles";
          (document.head || document.body || document.documentElement).appendChild(styleTag);
        }
        styleTag.textContent = rules.join("\n\n");
      }

      function styleAttrs(styleKey) {
        if (!styleKey) return "";
        return ` data-pd-style="${attr(styleKey)}"`;
      }

      function editAttrs(type, path, styleKey = "") {
        const resolvedStyleKey = styleKey || styleKeyFromPath(path);
        const style = styleAttrs(resolvedStyleKey);
        if (PD_ADMIN_EXPORT_LOCK) return style;
        return ` data-pd-edit="${attr(type)}" data-pd-path="${attr(path)}"${style}`;
      }

      function isAbsoluteMediaUrl(value) {
        return /^https?:\/\//i.test(String(value || "").trim());
      }

      function resolveMedia(key, fallback, index = null) {
        const media = PROPOSTA.wordpressMedia || {};
        if (media.enabled === true) {
          const value = key === "gallery" ? media.gallery?.[index] : media[key];
          if (isAbsoluteMediaUrl(value)) return String(value).trim();
        }
        return fallback;
      }

      function handleImageError(image) {
        if (!image || image.dataset.fallbackApplied === "true") return;
        image.dataset.fallbackApplied = "true";
        image.style.display = "none";

        const holder = image.closest("figure,.pd-brand-showcase,.pd-identity-art,.pd-gallery-card,.pd-brand,.pd-quick-edit-preview");
        if (!holder) return;

        holder.classList.add("pd-image-holder-broken");
        if (!holder.querySelector(".pd-image-fallback")) {
          const label = image.alt || "Imagem indisponível";
          holder.insertAdjacentHTML("beforeend", `<span class="pd-image-fallback">${escapeHTML(label)}</span>`);
        }
      }

        if (!panel || !button) return;
        button.setAttribute("aria-expanded", String(isOpen));
        panel.style.maxHeight = isOpen ? panel.scrollHeight + "px" : "0px";
      }

      function setupAccordion() {
        const accordionItems = $$(".pd-accordion-item");

        accordionItems.forEach((item) => {
          const button = item.querySelector(".pd-accordion-trigger");
          if (!button) return;

          button.addEventListener("click", () => {
            const isOpening = !item.classList.contains("open");

            if (PROPOSTA.behavior.closeOtherAccordions) {
              accordionItems.forEach((otherItem) => {
                if (otherItem !== item) {
                  otherItem.classList.remove("open");
                  syncAccordion(otherItem);
                }
              });
            }

            item.classList.toggle("open", isOpening);
            syncAccordion(item);
          });

          syncAccordion(item);
        });

        window.addEventListener("resize", () => {
          accordionItems.forEach(syncAccordion);
        });
      }

      function updateInvestmentFromPackage(index) {
        const packageItem = PROPOSTA.packages.items[index];
        if (!packageItem) return;

        const price = $("#pd-investment-price");
        const note = $("#pd-investment-note");
        const approve = $("#pd-approve-link");
        PROPOSTA.investment.packageName = packageItem.name;
        PROPOSTA.investment.price = packageItem.price;
        PROPOSTA.investment.note = packageItem.investmentNote || packageItem.description;

        if (price) price.textContent = packageItem.price;
        if (note) note.textContent = packageItem.investmentNote || packageItem.description;

        $$(".pd-package-card").forEach((card) => {
          card.classList.toggle("is-active", Number(card.dataset.packageIndex) === index);

      function setupReveal() {
        const revealItems = $$(".pd-reveal");
        if (!PROPOSTA.behavior.enableScrollReveal || !("IntersectionObserver" in window)) {
          revealItems.forEach((item) => item.classList.add("is-visible"));
          return;
        }

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.12 }
        );

        revealItems.forEach((item) => observer.observe(item));
      }

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function isPlainObject(value) {
        return value && typeof value === "object" && !Array.isArray(value);
      }

      function mergeDeep(target, source) {
        if (!isPlainObject(source)) return target;

        Object.keys(source).forEach((key) => {
          const sourceValue = source[key];
          const targetValue = target[key];

          if (Array.isArray(sourceValue)) {
            target[key] = sourceValue;
          } else if (isPlainObject(sourceValue) && isPlainObject(targetValue)) {
            target[key] = mergeDeep({ ...targetValue }, sourceValue);
          } else {
            target[key] = sourceValue;
          }
        });

        return target;
      }

      function getPath(source, path) {
        return path.split(".").reduce((current, key) => current?.[key], source);
      }

      function setPath(source, path, value) {
        const keys = path.split(".");
        let target = source;

        keys.slice(0, -1).forEach((key) => {
          if (!target[key] || typeof target[key] !== "object") target[key] = {};
          target = target[key];
        });

        target[keys[keys.length - 1]] = value;
      }

        if (PD_ADMIN_EXPORT_LOCK) return;

        try {
          const saved = localStorage.getItem(PD_STORAGE_KEY);
          if (!saved) return;
          PROPOSTA = mergeDeep(deepClone(PD_DEFAULT_PROPOSTA), JSON.parse(saved));
        } catch {
          localStorage.removeItem(PD_STORAGE_KEY);
        }
      }

      function applyAdminFormToProposal() {
        const form = $("#pd-admin-form");
        if (!form) return;

        $$("[data-pd-path]", form).forEach((field) => {
          const path = field.dataset.pdPath;
          const value = field.type === "checkbox" ? field.checked : field.value;
          setPath(PROPOSTA, path, value);
        });

        $$("[data-pd-array-path]", form).forEach((field) => {
          const path = field.dataset.pdArrayPath;
          const items = field.value
            .split("\n")
            .map((item) => item.trim())
            .filter(Boolean);
          setPath(PROPOSTA, path, items);
        });

        refreshProposal();
      }

      function currentViewportDevice() {
        const width = window.innerWidth || 1200;
        if (width <= 640) return "mobile";
        if (width <= 980) return "tablet";
        return "desktop";
      }

      function styleInputId(key) {
        return `pd-style-${key.replace(/[A-Z]/g, (char) => `-${char.toLowerCase()}`)}`;
      }

      function fillQuickStyleFields(styleKey, device = pdQuickEdit?.device || currentViewportDevice()) {
        const entry = pdQuickEdit?.visualDraft || normalizeVisualStyleEntry(PROPOSTA.visual?.[styleKey] || {});
        const style = entry[device] || emptyVisualStyle();
        const deviceSelect = $("#pd-style-device");
        if (deviceSelect) deviceSelect.value = device;

        Object.keys(PD_STYLE_PROPS).forEach((key) => {
          const input = $(`#${styleInputId(key)}`);
          if (input) input.value = style[key] || "";
        });
      }

      function readQuickStyleFields(styleKey) {
        if (!styleKey || !pdQuickEdit) return;
        const device = pdQuickEdit.device || currentViewportDevice();
        pdQuickEdit.visualDraft ||= normalizeVisualStyleEntry(PROPOSTA.visual?.[styleKey] || {});
        pdQuickEdit.visualDraft[device] ||= emptyVisualStyle();

        Object.keys(PD_STYLE_PROPS).forEach((key) => {
          const input = $(`#${styleInputId(key)}`);
          pdQuickEdit.visualDraft[device][key] = input ? input.value.trim() : "";
        });
      }

      function openQuickEdit(element) {
        if (!pdAdminMode || !element) return;
        const type = element.dataset.pdEdit || "text";
        const path = element.dataset.pdPath || "";
        const styleKey = element.dataset.pdStyle || styleKeyFromPath(path);
        if (!path) return;

        const device = currentViewportDevice();
        pdQuickEdit = {
          type,
          path,
          styleKey,
          device,
          visualDraft: normalizeVisualStyleEntry(PROPOSTA.visual?.[styleKey] || {})
        };
        const value = getPath(PROPOSTA, path) ?? "";
        const modal = $("#pd-quick-edit-modal");
        const fields = $("#pd-quick-edit-content-fields");
        const pathLabel = $("#pd-quick-edit-path");

        if (pathLabel) pathLabel.textContent = path;
        if (fields) fields.innerHTML = quickInputMarkup(type, path, value);
        fillQuickStyleFields(styleKey, device);
        setQuickTab("content");

        const valueInput = $("#pd-quick-edit-value");
        const colorPicker = $("#pd-quick-edit-color-picker");
        const fileInput = $("#pd-quick-edit-file");

        if (type === "image") {
          setQuickPreview(value);
          valueInput?.addEventListener("input", () => setQuickPreview(valueInput.value));
          fileInput?.addEventListener("change", () => {
            const file = fileInput.files?.[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
              valueInput.value = String(reader.result || "");
              setQuickPreview(valueInput.value);
            };
            reader.readAsDataURL(file);
          });
        }

        if (type === "color" && colorPicker && valueInput) {
          colorPicker.addEventListener("input", () => {
            valueInput.value = colorPicker.value;
          });
        }

        if (modal) {
          modal.hidden = false;
          modal.setAttribute("aria-hidden", "false");
          window.setTimeout(() => valueInput?.focus(), 30);
        }
      }

      function closeQuickEdit() {
        const modal = $("#pd-quick-edit-modal");
        pdQuickEdit = null;
        if (modal) {
          modal.hidden = true;
          modal.setAttribute("aria-hidden", "true");
        }
      }

      function applyQuickEdit() {
        if (!pdQuickEdit) return;
        const valueInput = $("#pd-quick-edit-value");
        if (valueInput) {
          setPath(PROPOSTA, pdQuickEdit.path, valueInput.value);
        }
        readQuickStyleFields(pdQuickEdit.styleKey);
        if (pdQuickEdit.styleKey) {
          PROPOSTA.visual ||= {};
          PROPOSTA.visual[pdQuickEdit.styleKey] = normalizeVisualStyleEntry(pdQuickEdit.visualDraft || {});
        }
        refreshProposal();
        renderAdminEditor();
        closeQuickEdit();
        showAdminToast("Alteração aplicada. Salve o rascunho para manter.");
      }

      function handleVisualEditClick(event) {
        if (!pdAdminMode || PD_ADMIN_EXPORT_LOCK) return;
        const target = event.target.closest?.("[data-pd-edit]");
        if (!target || target.closest("[data-pd-admin]")) return;
        event.preventDefault();
        event.stopPropagation();
        openQuickEdit(target);

      }

      function restoreDefaultProposal() {
        if (!window.confirm("Restaurar o padrão e apagar o rascunho local?")) return;
        PROPOSTA = deepClone(PD_DEFAULT_PROPOSTA);
        localStorage.removeItem(PD_STORAGE_KEY);
        refreshProposal();
        renderAdminEditor();
        showAdminToast("Padrão restaurado.");
      }

      function downloadTextFile(filename, content, type = "text/plain;charset=utf-8") {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function exportFinalHTML() {
        applyAdminFormToProposal();
        renderVisualStyles();
        const proposalShell = $("#pd-proposal-shell");
        const exportShell = proposalShell?.cloneNode(true);
        if (exportShell) {
          exportShell.classList.remove("pd-admin-active");
          exportShell.querySelectorAll("[data-pd-edit], [data-pd-path]").forEach((element) => {
            element.removeAttribute("data-pd-edit");
            element.removeAttribute("data-pd-path");
          });
        }
        const styleTag = Array.from(document.querySelectorAll("style")).find((style) =>
          style.id !== "pd-dynamic-visual-styles" && style.textContent.includes(".pd-proposal")
        );
        const dynamicStyleTag = document.getElementById("pd-dynamic-visual-styles");
        const serializedProposal = JSON.stringify(PROPOSTA, null, 8).replace(/</g, "\\u003c");
        let scriptSource = PD_SCRIPT_SOURCE || "";
        scriptSource = scriptSource.replace(
          /let PROPOSTA = [\s\S]*?\n\s*const PD_STORAGE_KEY =/,
          `let PROPOSTA = ${serializedProposal};\n\n      const PD_STORAGE_KEY =`
        );
        scriptSource = scriptSource.replace("const PD_ADMIN_EXPORT_LOCK = false;", "const PD_ADMIN_EXPORT_LOCK = true;");

        const html = `<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>${escapeHTML(PROPOSTA.brand.agencyName)} | ${escapeHTML(PROPOSTA.client.proposalName)} — ${escapeHTML(PROPOSTA.client.name)}</title>
    <style>
${styleTag ? styleTag.textContent : ""}
    </style>
${dynamicStyleTag?.textContent ? `    <style id="pd-dynamic-visual-styles">\n${dynamicStyleTag.textContent}\n    </style>` : ""}
  </head>
  <body>
${exportShell ? exportShell.outerHTML : ""}
    <script>
${scriptSource}
    <\/script>
  </body>
</html>`;

        downloadTextFile(`proposta-${PROPOSTA.client.slug || "pixel-demand"}.html`, html, "text/html;charset=utf-8");
        showAdminToast("HTML final exportado sem painel admin.");
      }

      function exportPDF() {
        applyAdminFormToProposal();
        showAdminToast("Abrindo impressão para exportar PDF.");
        window.setTimeout(() => window.print(), 120);
      }

      function setupAdmin() {
        if (PD_ADMIN_EXPORT_LOCK) return;

        window.addEventListener("keydown", (event) => {
          if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === "e") {
            event.preventDefault();
            setAdminMode(!pdAdminMode);
          }
        });

        document.addEventListener("click", handleVisualEditClick, true);
        $("#pd-admin-visual")?.addEventListener("click", () => {
          closeAdminDrawer();
          showAdminToast("Clique diretamente em um texto, imagem, card ou bloco da proposta.");
        });
        $("#pd-admin-open")?.addEventListener("click", openAdminDrawer);
        $("#pd-admin-close")?.addEventListener("click", closeAdminDrawer);
        $("#pd-admin-close-footer")?.addEventListener("click", closeAdminDrawer);
        $("#pd-admin-backdrop")?.addEventListener("click", closeAdminDrawer);
        $("#pd-admin-exit")?.addEventListener("click", () => setAdminMode(false));
        $("#pd-quick-edit-close")?.addEventListener("click", closeQuickEdit);
        $("#pd-quick-edit-cancel")?.addEventListener("click", closeQuickEdit);
        $("#pd-quick-edit-apply")?.addEventListener("click", applyQuickEdit);
        $("#pd-quick-edit-modal")?.addEventListener("click", (event) => {
          if (event.target?.id === "pd-quick-edit-modal") closeQuickEdit();
        });
        $("#pd-style-device")?.addEventListener("change", (event) => {
          if (!pdQuickEdit) return;
          readQuickStyleFields(pdQuickEdit.styleKey);
          pdQuickEdit.device = event.target.value || "desktop";
          fillQuickStyleFields(pdQuickEdit.styleKey, pdQuickEdit.device);
        });
        $$(".pd-quick-edit-tab").forEach((button) => {
          button.addEventListener("click", () => setQuickTab(button.dataset.quickTab || "content"));
        });
        $("#pd-admin-apply")?.addEventListener("click", () => {
          applyAdminFormToProposal();
          renderAdminEditor();
          showAdminToast("Prévia atualizada.");
        });
        $("#pd-admin-save")?.addEventListener("click", saveDraft);
        $("#pd-admin-save-drawer")?.addEventListener("click", saveDraft);
        $("#pd-admin-reset")?.addEventListener("click", restoreDefaultProposal);
        $("#pd-admin-export-html")?.addEventListener("click", exportFinalHTML);
        $("#pd-admin-export-pdf")?.addEventListener("click", exportPDF);
      }

      function initProposal() {
        refreshProposal();
      }

      loadSavedDraft();
      migrateVisualStyles();
      initProposal();
      setupAdmin();
    </script>
